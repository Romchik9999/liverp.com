\<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LIVE RP | Админ-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-red-500">🎮 Панель управления LIVE RP</h1>
        
        <div class="bg-gray-800 p-4 rounded-xl mb-6 flex items-center gap-4 border border-white/5">
            <span class="text-gray-400 text-sm font-bold uppercase">Пароль доступа:</span>
            <input type="password" id="adminToken" class="bg-gray-700 px-4 py-2 rounded-lg flex-1 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Введите пароль из файла .env">
        </div>
        
        <div class="grid md:grid-cols-2 gap-6 mb-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-white/5">
                <h2 class="text-xl font-bold mb-4">📊 Изменить онлайн</h2>
                <div class="flex gap-4">
                    <input type="number" id="onlineInput" class="bg-gray-700 px-4 py-2 rounded-lg flex-1" placeholder="Цифра онлайна">
                    <button onclick="setOnline()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-bold">Применить</button>
                </div>
            </div>
            
            <div class="bg-gray-800 p-6 rounded-xl border border-white/5">
                <h2 class="text-xl font-bold mb-4">📢 Объявление на сайт</h2>
                <input type="text" id="announceMsg" class="bg-gray-700 px-4 py-2 rounded-lg w-full mb-3" placeholder="Текст сообщения для игроков">
                <button onclick="sendAnnounce()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg font-bold w-full">Отправить</button>
            </div>
        </div>
        
        <div class="bg-gray-800 p-6 rounded-xl border border-white/5">
            <h2 class="text-xl font-bold mb-2">📈 Мониторинг бэкенда</h2>
            <div id="stats" class="text-gray-400 space-y-1 text-sm">Загрузка данных...</div>
        </div>
    </div>
    
    <script>
        // Функция автоматического сбора заголовков с паролем
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Admin-Token': document.getElementById('adminToken').value
            };
        }

        function setOnline() {
            const val = document.getElementById('onlineInput').value;
            fetch('/api/admin/set-online', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ online: parseInt(val) })
            })
            .then(res => { if(!res.ok) throw new Error('Ошибка! Проверьте пароль.'); return res.json(); })
            .then(() => alert('Онлайн успешно изменен!'))
            .catch(err => alert(err.message));
        }

        function sendAnnounce() {
            const msg = document.getElementById('announceMsg').value;
            fetch('/api/admin/announce', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ message: msg })
            })
            .then(res => { if(!res.ok) throw new Error('Ошибка! Проверьте пароль.'); return res.json(); })
            .then(() => { alert('Объявление отправлено!'); document.getElementById('announceMsg').value = ''; })
            .catch(err => alert(err.message));
        }

        // Обновление статистики
        setInterval(() => {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('stats').innerHTML = `
                        <p>🟢 Онлайн прямо сейчас: <b class="text-white">${data.online}</b> / ${data.maxOnline}</p>
                        <p>⏱ Время работы сервера: <b class="text-white">${Math.floor(data.uptime / 60)} мин.</b></p>
                    `;
                }).catch(() => {});
        }, 2000);
    </script>
</body>
</html>
